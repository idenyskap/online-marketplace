spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth/**, /api/v1/users/**

            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/products/**

            - id: order-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/orders/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
