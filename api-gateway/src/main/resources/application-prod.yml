spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URL}
              predicates:
                - Path=/api/v1/auth/**, /api/v1/users/**

            - id: product-service
              uri: ${PRODUCT_SERVICE_URL}
              predicates:
                - Path=/api/v1/products/**

            - id: order-service
              uri: ${ORDER_SERVICE_URL}
              predicates:
                - Path=/api/v1/orders/**

logging:
  level:
    org.springframework.cloud.gateway: WARN

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: never
