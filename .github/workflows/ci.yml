name: CI Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build User Service
        run: mvn -f user-service/pom.xml clean verify -DskipITs

      - name: Build Product Service
        run: mvn -f product-service/pom.xml clean verify -DskipITs

      - name: Build Order Service
        run: mvn -f order-service/pom.xml clean verify -DskipITs

      - name: Build Notification Service
        run: mvn -f notification-service/pom.xml clean verify -DskipITs

      - name: Build API Gateway
        run: mvn -f api-gateway/pom.xml clean verify -DskipITs