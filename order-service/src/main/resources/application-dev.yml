spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/marketplace_orders
    username: postgres
    password: postgres

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092

product-service:
  url: http://localhost:8082

logging:
  level:
    com.marketplace.orderservice: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
