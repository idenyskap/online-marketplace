spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/marketplace_products
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

logging:
  level:
    com.marketplace.productservice: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
