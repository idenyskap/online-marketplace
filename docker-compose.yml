version: '3.8'

services:

  users-db:
    image: postgres:15
    container_name: marketplace-users-db
    environment:
      POSTGRES_DB: marketplace_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  users-db-data:
