services:

  users-db:
    image: postgres:15
    container_name: marketplace-users-db
    environment:
      POSTGRES_DB: marketplace_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  products-db:
    image: mongo:7
    container_name: marketplace-products-db
    ports:
      - "27017:27017"
    volumes:
      - products-db-data:/data/db
    restart: unless-stopped

  orders-db:
    image: postgres:15
    container_name: marketplace-orders-db
    environment:
      POSTGRES_DB: marketplace_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: marketplace-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: marketplace-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: marketplace-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: marketplace-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: marketplace-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: marketplace-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://users-db:5432/marketplace_users
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
    depends_on:
      - users-db
    restart: unless-stopped

  product-service:
    build: ./product-service
    container_name: marketplace-product-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_MONGODB_URI: mongodb://products-db:27017/marketplace_products
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: product-images
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - products-db
      - redis
      - minio
      - kafka
    restart: unless-stopped

  order-service:
    build: ./order-service
    container_name: marketplace-order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://orders-db:5432/marketplace_orders
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      PRODUCT_SERVICE_URL: http://product-service:8082
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - orders-db
      - kafka
      - redis
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: marketplace-notification-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM: marketplace@example.com
    depends_on:
      - kafka
      - mailpit
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: marketplace-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      - user-service
      - product-service
      - order-service
      - redis
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: marketplace-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
      - api-gateway
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: marketplace-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  users-db-data:
  products-db-data:
  orders-db-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
