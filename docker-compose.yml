services:

  users-db:
    image: postgres:15
    container_name: marketplace-users-db
    environment:
      POSTGRES_DB: marketplace_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  products-db:
    image: mongo:7
    container_name: marketplace-products-db
    ports:
      - "27017:27017"
    volumes:
      - products-db-data:/data/db
    restart: unless-stopped

  orders-db:
    image: postgres:15
    container_name: marketplace-orders-db
    environment:
      POSTGRES_DB: marketplace_orders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: marketplace-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: marketplace-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

volumes:
  users-db-data:
  products-db-data:
  orders-db-data:
